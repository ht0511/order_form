<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Đặt hàng</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f4f6fb;
}

.hero{
background:linear-gradient(135deg,#2e7dff,#00c6ff);
color:white;
padding:60px 20px;
text-align:center;
}

.hero h1{
margin:0;
font-size:32px;
}

.container{
max-width:900px;
margin:auto;
padding:30px 20px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:5px;
}

label{
font-weight:600;
font-size:14px;
}

button{
width:100%;
padding:16px;
background:#2e7dff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#1c5ed6;
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="hero">

<h1>Đặt hàng nhanh</h1>
<p>Điền thông tin để chúng tôi gửi hàng cho bạn</p>

</div>

<div class="container">

<div class="card">

<div class="grid">

<div>
<label>Họ và tên</label>
<input id="name">
</div>

<div>
<label>Số điện thoại</label>
<input id="phone">
</div>

<div>
<label>Tỉnh / Thành</label>
<select id="province"></select>
</div>

<div>
<label>Quận / Huyện</label>
<select id="district"></select>
</div>

<div>
<label>Phường / Xã</label>
<select id="ward"></select>
</div>

<div>
<label>Địa chỉ chi tiết</label>
<input id="address">
</div>

<div>
<label>Nguồn khách</label>
<select id="source">
<option>Facebook</option>
<option>Zalo</option>
</select>
</div>

<div>
<label>Account đã inbox</label>
<input id="account">
</div>

<div>
<label>Thanh toán</label>
<select id="payment">
<option>COD</option>
<option>Chuyển khoản</option>
</select>
</div>

</div>

<button onclick="submitForm()">Gửi đơn đặt hàng</button>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzLQIB8zg_lPmPrNvheeblxJso24QKGifNOkynRiNLlqh0t6cVvGS_tz3D4jCIAXGNe/exec";

let provincesData=[];

async function loadAddress(){

const res=await fetch("https://provinces.open-api.vn/api/?depth=3");
provincesData=await res.json();

const provinceSelect=document.getElementById("province");

provinceSelect.innerHTML="<option>Chọn tỉnh</option>";

provincesData.forEach(p=>{

const option=document.createElement("option");

option.value=p.name;
option.text=p.name;

provinceSelect.appendChild(option);

});

}

document.getElementById("province").addEventListener("change",function(){

const province=this.value;

const districtSelect=document.getElementById("district");
districtSelect.innerHTML="<option>Chọn quận</option>";

const wardSelect=document.getElementById("ward");
wardSelect.innerHTML="<option>Chọn phường</option>";

const p=provincesData.find(x=>x.name===province);

p.districts.forEach(d=>{

const option=document.createElement("option");

option.value=d.name;
option.text=d.name;

districtSelect.appendChild(option);

});

});

document.getElementById("district").addEventListener("change",function(){

const province=document.getElementById("province").value;
const district=this.value;

const wardSelect=document.getElementById("ward");
wardSelect.innerHTML="<option>Chọn phường</option>";

const p=provincesData.find(x=>x.name===province);
const d=p.districts.find(x=>x.name===district);

d.wards.forEach(w=>{

const option=document.createElement("option");

option.value=w.name;
option.text=w.name;

wardSelect.appendChild(option);

});

});

async function submitForm(){

const data={
name:name.value,
phone:phone.value,
province:province.value,
district:district.value,
ward:ward.value,
address:address.value,
source:source.value,
account:account.value,
payment:payment.value
};

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
});

alert("Đặt hàng thành công");

}

loadAddress();

</script>

</body>
</html>
