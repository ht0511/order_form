<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Xác nhận thông tin nhận hàng</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px 10px; color: #334155; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-top: 0; color: #1e293b; }
        .desc { text-align: center; font-size: 14px; color: #64748b; margin-bottom: 20px; }
        label { font-weight: 600; font-size: 13px; display: block; margin-top: 12px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; margin-top: 5px; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: #2563eb; }
        .sub-label { font-size: 11px; color: #94a3b8; margin-top: 4px; display: block; }
        .total-box { background: #eff6ff; padding: 15px; border-radius: 10px; margin: 15px 0; font-weight: 600; text-align: center; color: #1d4ed8; border: 1px dashed #3b82f6; }
        .ship-note { font-size: 12px; color: #0369a1; margin-top: 5px; font-weight: 400; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        .success { display: none; text-align: center; padding: 30px 20px; }
        .order-id-box { background: #f8fafc; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #e2e8f0; }
        .order-id { font-size: 32px; font-weight: 800; color: #2563eb; }
        .last6-note { background: #fff7ed; color: #c2410c; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid #ffedd5; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="formCard">
        <h2>Xác nhận thông tin</h2>
        <p class="desc">Vui lòng điền đúng thông tin để shop gửi hàng</p>

        <form id="orderForm" action="https://script.google.com/macros/s/AKfycbxQmiFg3F2hObMv-POj3Y82HXey8eWfby7lmTKdTYv06JgsFRsSn1bocS9bsdL1oKCE/exec" method="POST" target="hidden_iframe" onsubmit="return handleSubmit()">
            
            <label>Tên người nhận hàng</label>
            <input name="name" placeholder="Nguyễn Văn A" required>

            <label>Số điện thoại (10 số)</label>
            <input name="phone" id="phone" type="tel" placeholder="0912345678" maxlength="10" required oninput="validatePhone(this)">
            <span id="phoneError" style="color: #dc2626; font-size: 11px; display: none; margin-top: 4px;"></span>

            <label>Tỉnh / Thành phố</label>
            <select name="province" id="province" required><option value="">Chọn tỉnh</option></select>

            <label>Quận / Huyện</label>
            <select name="district" id="district" required><option value="">Chọn huyện</option></select>

            <label>Phường / Xã</label>
            <select name="ward" id="ward" required><option value="">Chọn xã</option></select>

            <label>Địa chỉ chi tiết</label>
            <input name="address" required placeholder="Số nhà, tên đường...">

            <label>Bạn đã order qua đâu?</label>
            <select name="source">
                <option>Facebook</option>
                <option>Zalo</option>
            </select>

            <label>Tên FB / Zalo đã order</label>
            <input name="account" placeholder="Ví dụ: Thuong Na" required>

            <hr style="margin-top: 25px; border: 0; border-top: 1px solid #eee;">

            <label>Tổng tiền hàng (VNĐ)</label>
            <input type="text" id="total_display" inputmode="numeric" placeholder="500.000" oninput="formatCurrency(this, 'total')">
            <input type="hidden" name="total" id="total">

            <label>Số tiền đã chuyển khoản (VNĐ)</label>
            <input type="text" id="paid_display" inputmode="numeric" placeholder="0" oninput="formatCurrency(this, 'paid')">
            <input type="hidden" name="paid" id="paid">

            <div class="total-box">
                Số tiền còn lại: <span id="remain_text">0</span> VNĐ + Ship
                <div class="ship-note">* Phí ship dự kiến: 14k.</div>
            </div>

            <label>Thanh toán phần còn lại qua</label>
            <select name="payment" id="payment" onchange="togglePaymentNote()">
                <option value="COD">COD (Thanh toán khi nhận hàng)</option>
                <option value="Chuyển khoản">Chuyển khoản</option>
            </select>
            
            <div id="transferNote" style="display: none; background: #fff1f2; color: #e11d48; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; border: 1px solid #fecdd3; font-weight: 600;">
                📢 Vui lòng gửi ảnh bill chuyển khoản qua Inbox nhé!
            </div>

            <button type="submit" id="submitBtn">Xác nhận gửi thông tin</button>
        </form>
    </div>

    <div class="card success" id="successCard">
        <div style="font-size: 50px;">✅</div>
        <h2>Gửi đơn thành công!</h2>
        <div class="order-id-box">
            <p style="margin:0; font-size:13px; color:#64748b;">Mã đơn hàng:</p>
            <div class="order-id" id="displayOrderId"></div>
        </div>
        <div id="summaryInfo" style="text-align: left; background: #f8fafc; padding: 15px; border-radius: 10px; font-size: 14px; line-height: 1.6; border: 1px solid #e2e8f0; margin-bottom: 15px;">
            <div id="infoDetails"></div>
        </div>
        <div class="last6-note" id="finalNote">📌 Ghi chú: Mã đơn là 6 số cuối SĐT.</div>
        <button onclick="location.reload()" style="background: #94a3b8; margin-top: 20px;">Quay lại</button>
    </div>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){showSuccess();}"></iframe>

<script>
    let submitted = false;
    let provincesData = [];

    // 1. Định dạng tiền không lỗi Telex
    function formatCurrency(input, hiddenId) {
        let cursorPosition = input.selectionStart;
        let originalValue = input.value;
        let rawValue = input.value.replace(/\D/g, "");
        document.getElementById(hiddenId).value = rawValue;
        if (rawValue === "") { input.value = ""; calcRemain(); return; }
        let formattedValue = new Intl.NumberFormat('vi-VN').format(rawValue);
        if (originalValue !== formattedValue) {
            input.value = formattedValue;
            let diff = formattedValue.length - originalValue.length;
            cursorPosition += diff;
            input.setSelectionRange(cursorPosition, cursorPosition);
        }
        calcRemain();
    }

    function calcRemain() {
        const total = parseFloat(document.getElementById("total").value) || 0;
        const paid = parseFloat(document.getElementById("paid").value) || 0;
        document.getElementById("remain_text").innerText = (total - paid).toLocaleString('vi-VN');
    }

    // 2. Ép quy tắc SĐT
    function validatePhone(input) {
        input.value = input.value.replace(/\D/g, '').substring(0, 10);
        const errorLabel = document.getElementById("phoneError");
        const val = input.value;
        if (val.length > 0 && val[0] !== '0') {
            input.value = '';
            errorLabel.innerText = "⚠️ Phải bắt đầu bằng số 0";
            errorLabel.style.display = "block";
        } else if (val.length > 0 && val.length < 10) {
            errorLabel.innerText = "⚠️ Cần đủ 10 số (hiện có " + val.length + ")";
            errorLabel.style.display = "block";
        } else { errorLabel.style.display = "none"; }
    }

    function togglePaymentNote() {
        const paymentMethod = document.getElementById("payment").value;
        document.getElementById("transferNote").style.display = (paymentMethod === "Chuyển khoản") ? "block" : "none";
    }

    function handleSubmit() {
        if (!/^0[0-9]{9}$/.test(document.getElementById("phone").value)) {
            alert("Vui lòng nhập đúng 10 số điện thoại!");
            return false;
        }
        document.getElementById("submitBtn").innerText = "Đang gửi...";
        document.getElementById("submitBtn").disabled = true;
        submitted = true;
        return true;
    }

    // 3. Hiện màn hình thành công & Tóm tắt
    function showSuccess() {
        const name = document.querySelector('input[name="name"]').value;
        const phone = document.getElementById("phone").value;
        const province = document.getElementById("province").value;
        const district = document.getElementById("district").value;
        const ward = document.getElementById("ward").value;
        const address = document.querySelector('input[name="address"]').value;
        const payment = document.getElementById("payment").value;
        const remain = document.getElementById("remain_text").innerText;

        document.getElementById("displayOrderId").innerText = "OD-" + phone.slice(-6);
        document.getElementById("infoDetails").innerHTML = `
            👤 <b>Người nhận:</b> ${name}<br>
            📞 <b>SĐT:</b> ${phone}<br>
            🏠 <b>Địa chỉ:</b> ${address}, ${ward}, ${district}, ${province}<br>
            💰 <b>Cần trả:</b> ${remain} VNĐ + Ship<br>
            💳 <b>Thanh toán:</b> ${payment}
        `;

        if (payment === "Chuyển khoản") {
            document.getElementById("finalNote").innerHTML += "<br><span style='color: #dc2626;'>⚠️ Đừng quên gửi ảnh bill qua inbox!</span>";
        }
        document.getElementById("formCard").style.display = "none";
        document.getElementById("successCard").style.display = "block";
        window.scrollTo(0, 0);
    }

    async function loadAddress() {
        const res = await fetch("https://provinces.open-api.vn/api/?depth=3");
        provincesData = await res.json();
        const pSelect = document.getElementById("province");
        provincesData.forEach(p => pSelect.add(new Option(p.name, p.name)));
    }

    document.getElementById("province").onchange = function() {
        const dSelect = document.getElementById("district");
        const wSelect = document.getElementById("ward");
        dSelect.innerHTML = '<option value="">Chọn huyện</option>';
        wSelect.innerHTML = '<option value="">Chọn xã</option>';
        const p = provincesData.find(x => x.name === this.value);
        if (p) p.districts.forEach(d => dSelect.add(new Option(d.name, d.name)));
    };

    document.getElementById("district").onchange = function() {
        const wSelect = document.getElementById("ward");
        wSelect.innerHTML = '<option value="">Chọn xã</option>';
        const p = provincesData.find(x => x.name === document.getElementById("province").value);
        const d = p.districts.find(x => x.name === this.value);
        if (d) d.wards.forEach(w => wSelect.add(new Option(w.name, w.name)));
    };

    loadAddress();
</script>
</body>
</html>
