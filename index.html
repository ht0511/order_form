<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Xác nhận thông tin nhận hàng</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px 10px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-top: 0; color: #1e293b; }
        .desc { text-align: center; font-size: 14px; color: #64748b; margin-bottom: 20px; }
        label { font-weight: 600; font-size: 13px; color: #334155; display: block; margin-top: 12px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; margin-top: 5px; box-sizing: border-box; font-size: 14px; }
        .total-box { background: #eff6ff; padding: 15px; border-radius: 10px; margin: 15px 0; font-weight: 600; text-align: center; color: #1d4ed8; border: 1px dashed #3b82f6; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        button:hover { background: #1d4ed8; }
        .success { display: none; text-align: center; padding: 40px 20px; }
        .order-id { font-size: 24px; font-weight: 800; color: #2563eb; margin: 15px 0; letter-spacing: 1px; }
        .note { font-size: 12px; color: #64748b; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="formCard">
        <h2>Xác nhận nhận hàng</h2>
        <p class="desc">Vui lòng điền thông tin chính xác</p>

        <form id="orderForm" action="LINK_WEB_APP_CUA_BAN" method="POST" target="hidden_iframe" onsubmit="handleSubmit()">
            
            <label>Họ và tên</label>
            <input name="name" id="name" placeholder="Nguyễn Văn A" required>

            <label>Số điện thoại</label>
            <input name="phone" id="phone" type="tel" placeholder="090..." required>

            <label>Tỉnh / Thành phố</label>
            <select name="province" id="province" required><option value="">Chọn tỉnh</option></select>

            <label>Quận / Huyện</label>
            <select name="district" id="district" required><option value="">Chọn huyện</option></select>

            <label>Phường / Xã</label>
            <select name="ward" id="ward" required><option value="">Chọn xã</option></select>

            <label>Địa chỉ chi tiết (Số nhà, đường...)</label>
            <input name="address" id="address" placeholder="123 Đường ABC..." required>

            <label>Nguồn liên hệ</label>
            <select name="source">
                <option>Facebook</option>
                <option>Zalo</option>
            </select>

            <label>Tên tài khoản (Facebook/Zalo)</label>
            <input name="account" placeholder="Tên nick của bạn">

            <label>Tổng đơn hàng (VNĐ)</label>
            <input name="total" id="total" type="number" placeholder="500000" oninput="calcRemain()">

            <label>Đã chuyển khoản (VNĐ)</label>
            <input name="paid" id="paid" type="number" placeholder="0" oninput="calcRemain()">

            <div class="total-box">
                Còn lại: <span id="remain">0</span> VNĐ
            </div>

            <label>Thanh toán phần còn lại qua</label>
            <select name="payment">
                <option>COD (Nhận hàng trả tiền)</option>
                <option>Chuyển khoản nốt</option>
            </select>

            <button type="submit" id="submitBtn">Xác nhận gửi đơn</button>
            <p class="note">* Shop sẽ liên hệ lại để xác nhận trước khi gửi.</p>
        </form>
    </div>

    <div class="card success" id="successCard">
        <div style="font-size: 50px;">✅</div>
        <h2>Gửi thành công!</h2>
        <p>Mã đơn hàng của bạn là:</p>
        <div class="order-id" id="displayOrderId"></div>
        <p style="color: #64748b;">Vui lòng chụp ảnh màn hình hoặc lưu lại mã này.</p>
        <button onclick="location.reload()" style="background: #64748b;">Quay lại</button>
    </div>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<script>
    // 1. Xử lý API Tỉnh/Thành
    let provincesData = [];
    async function loadAddress() {
        try {
            const res = await fetch("https://provinces.open-api.vn/api/?depth=3");
            provincesData = await res.json();
            const provinceSelect = document.getElementById("province");
            provincesData.forEach(p => {
                let opt = new Option(p.name, p.name);
                provinceSelect.add(opt);
            });
        } catch (e) { console.error("Lỗi tải địa chỉ"); }
    }

    document.getElementById("province").onchange = function() {
        const districtSelect = document.getElementById("district");
        const wardSelect = document.getElementById("ward");
        districtSelect.innerHTML = '<option value="">Chọn huyện</option>';
        wardSelect.innerHTML = '<option value="">Chọn xã</option>';
        
        const p = provincesData.find(x => x.name === this.value);
        if (p) p.districts.forEach(d => districtSelect.add(new Option(d.name, d.name)));
    };

    document.getElementById("district").onchange = function() {
        const wardSelect = document.getElementById("ward");
        wardSelect.innerHTML = '<option value="">Chọn xã</option>';
        const p = provincesData.find(x => x.name === document.getElementById("province").value);
        const d = p.districts.find(x => x.name === this.value);
        if (d) d.wards.forEach(w => wardSelect.add(new Option(w.name, w.name)));
    };

    // 2. Tính số tiền còn lại
    function calcRemain() {
        const total = parseFloat(document.getElementById("total").value) || 0;
        const paid = parseFloat(document.getElementById("paid").value) || 0;
        document.getElementById("remain").innerText = (total - paid).toLocaleString();
    }

    // 3. Xử lý khi nhấn Submit
    function handleSubmit() {
        const btn = document.getElementById("submitBtn");
        const phone = document.getElementById("phone").value;
        const orderId = "OD-" + phone.slice(-6);

        btn.innerText = "Đang xử lý...";
        btn.disabled = true;

        // Chuyển giao diện sau 1.5 giây (để form kịp gửi vào iframe)
        setTimeout(() => {
            document.getElementById("formCard").style.display = "none";
            document.getElementById("successCard").style.display = "block";
            document.getElementById("displayOrderId").innerText = orderId;
        }, 1500);
    }

    loadAddress();
</script>
</body>
</html>
