<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Xác nhận thông tin nhận hàng</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px 10px; color: #334155; }
        .container { max-width: 500px; margin: auto; }
        .btn-tracuu { background: #ffffff; color: #2563eb; padding: 10px 18px; text-decoration: none; font-weight: 600; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #bfdbfe; display: inline-flex; align-items: center; transition: all 0.3s; margin-bottom: 15px; float: right; }
        .btn-tracuu:hover { background: #eff6ff; box-shadow: 0 6px 12px rgba(37,99,235,0.15); transform: translateY(-2px); }
        .clearfix::after { content: ""; clear: both; display: table; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); clear: both; }
        h2 { text-align: center; margin-top: 0; color: #1e293b; }
        .desc { text-align: center; font-size: 14px; color: #64748b; margin-bottom: 20px; }
        label { font-weight: 600; font-size: 13px; display: block; margin-top: 12px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; margin-top: 5px; box-sizing: border-box; font-size: 15px; outline: none; font-family: 'Inter', sans-serif; }
        input:focus, select:focus, textarea:focus { border-color: #2563eb; }
        textarea { resize: vertical; min-height: 80px; }
        .total-box { background: #eff6ff; padding: 15px; border-radius: 10px; margin: 15px 0; font-weight: 600; text-align: center; color: #1d4ed8; border: 1px dashed #3b82f6; }
        .ship-note { font-size: 12px; color: #0369a1; margin-top: 5px; font-weight: 400; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: 0.3s;}
        button:hover { background: #1d4ed8; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        .success { display: none; text-align: center; padding: 30px 20px; }
        .order-id-box { background: #f8fafc; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #e2e8f0; }
        .order-id { font-size: 32px; font-weight: 800; color: #2563eb; }
        .select2-container .select2-selection--single { height: 46px !important; border-radius: 8px !important; border: 1px solid #cbd5e1 !important; display: flex !important; align-items: center; margin-top: 5px; }
        .select2-container--default .select2-selection--single .select2-selection__arrow { height: 44px !important; }
        .select2-selection__rendered { color: #334155 !important; padding-left: 12px !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="clearfix">
        <a href="tra-mvd.html" class="btn-tracuu">📦 Tra cứu vận đơn</a>
    </div>

    <div class="card" id="formCard">
        <h2>Xác nhận thông tin</h2>
        <p class="desc">Vui lòng điền đúng thông tin để shop gửi hàng</p>

        <form id="orderForm" action="https://script.google.com/macros/s/AKfycbyazgVzVOl6lCjFNzJBgCv72IwEGAW1mwvLq1L6rLWlzvjjgru5_dvY6877hdI06uBZ/exec" method="POST" target="hidden_iframe" onsubmit="return handleSubmit()">
            
            <label>Tên người nhận hàng</label>
            <input name="name" placeholder="Nguyễn Văn A" required>

            <label>Số điện thoại (10 số)</label>
            <input name="phone" id="phone" type="tel" placeholder="0912345678" maxlength="10" required oninput="validatePhone(this); updateQRCode();">
            <span id="phoneError" style="color: #dc2626; font-size: 11px; display: none; margin-top: 4px;"></span>

            <label>Tỉnh / Thành phố</label>
            <select name="province" id="province" required><option value="">Chọn tỉnh</option></select>

            <label>Quận / Huyện</label>
            <select name="district" id="district" required><option value="">Chọn huyện</option></select>

            <label>Phường / Xã</label>
            <select name="ward" id="ward" required><option value="">Chọn xã</option></select>

            <label>Địa chỉ chi tiết</label>
            <input name="address" required placeholder="Số nhà, tên đường...">

            <label>Order qua đâu?</label>
            <select name="source"><option>Facebook</option><option>Zalo</option></select>

            <label>Tên FB / Zalo đã order</label>
            <input name="account" id="account" required placeholder="Ví dụ: Thùy Trang" oninput="updateQRCode()">

            <hr style="margin-top: 25px; border: 0; border-top: 1px solid #eee;">

            <label>Tổng tiền hàng (VNĐ)</label>
            <input type="tel" id="total_input" inputmode="numeric" placeholder="Ví dụ: 500000" oninput="handleMoneyInput(this, 'total', 'total_text')" onblur="formatOnBlur(this)">
            <input type="hidden" name="total" id="total">
            <div id="total_text" style="font-size: 12px; color: #64748b; margin-top: 4px; font-style: italic;"></div>
            
            <label>Số tiền đã chuyển khoản (VNĐ)</label>
            <input type="tel" id="paid_input" inputmode="numeric" placeholder="Nhập 0 nếu chưa trả" oninput="handleMoneyInput(this, 'paid', 'paid_text')" onblur="formatOnBlur(this)">
            <input type="hidden" name="paid" id="paid">
            <div id="paid_text" style="font-size: 12px; color: #64748b; margin-top: 4px; font-style: italic;"></div>
            
            <div class="total-box">
                Số tiền còn lại: <span id="remain_text">0</span> VNĐ + Ship
            </div>

            <label>Thanh toán phần còn lại qua</label>
            <select name="payment" id="payment" onchange="togglePaymentNote()">
                <option value="COD">COD (Thanh toán khi nhận hàng)</option>
                <option value="Chuyển khoản">Chuyển khoản</option>
            </select>
            
            <div id="transferArea" style="display: none;">
                <div style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid #cbd5e1; text-align: center;">
                    <p style="margin: 0 0 10px 0; font-weight: 600; color: #1e293b; font-size: 14px;">Quét mã QR để thanh toán tự động</p>
                    
                    <img id="qrCodeImg" src="https://qr.sepay.vn/img?acc=96247HT0511&bank=BIDV&template=compact2" alt="Mã QR SePay" style="width: 220px; height: 220px; object-fit: contain; border-radius: 8px; border: 1px solid #e2e8f0; background: white; padding: 5px;">
                    <br>
                    <button type="button" onclick="downloadQR()" style="width: auto; padding: 8px 15px; background: #e2e8f0; color: #475569; border-radius: 6px; font-size: 12px; margin-top: 10px; border:none; cursor:pointer;">📥 Tải mã QR</button>
                    
                    <div style="text-align: left; font-size: 13px; margin-top: 15px; background: white; padding: 10px; border-radius: 6px; border: 1px dashed #94a3b8;">
                        🏦 Ngân hàng: <b>BIDV </b><br>
                        👤 Chủ TK: <b>BUI THI HOAI THUONG</b><br>
                        💳 Số TK: <b style="color: #2563eb; font-size: 15px;">96247HT0511</b>
                    </div>
                </div>

                <div style="background: #fff1f2; color: #e11d48; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 13px; border: 1px solid #fecdd3; font-weight: 600;">
                    📢 Tải lên ảnh Bill chuyển khoản:
                    <input type="file" id="imageFile" accept="image/*" onchange="encodeImageFileAsURL(this)" style="margin-top: 10px;">
                    <input type="hidden" name="imageBase64" id="imageBase64">
                    <input type="hidden" name="imageName" id="imageName">
                    <div id="uploadStatus" style="font-size: 11px; color: #059669; margin-top: 5px;"></div>
                </div>
            </div>

            <button type="submit" id="submitBtn">Xác nhận đơn hàng</button>
        </form>
    </div>

    <div class="card success" id="successCard" style="display:none; text-align:center; padding:30px;">
        <div style="font-size: 50px;">✅</div>
        <h2>Gửi đơn thành công!</h2>
        <div class="order-id-box">
            <p style="margin:0; font-size:13px; color:#64748b;">Mã đơn của bạn:</p>
            <div class="order-id" id="displayOrderId" style="font-size:32px; font-weight:800; color:#2563eb;"></div>
        </div>
        <button onclick="location.reload()" style="background: #94a3b8; width:100%; padding:15px; border-radius:8px; color:white; border:none; cursor:pointer;">Quay lại</button>
    </div>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){showSuccess();}"></iframe>

<script>
    let submitted = false;
    let provincesData = [];

    function updateQRCode() {
        const total = parseFloat(document.getElementById("total").value) || 0;
        const paid = parseFloat(document.getElementById("paid").value) || 0;
        const remain = total - paid;
        const phone = document.getElementById("phone").value;
        const orderId = phone.length >= 6 ? "OD-" + phone.slice(-6) : "OD-" + phone;

        // SỬ DỤNG STK 96247HT0511 TRỰC TIẾP TRONG LINK QR
        let qrUrl = `https://qr.sepay.vn/img?acc=96247HT0511&bank=BIDV&template=compact2`;
        
        if (remain > 0) {
            qrUrl += `&amount=${remain}&des=${encodeURIComponent(orderId)}`;
        } else {
            qrUrl += `&des=${encodeURIComponent(orderId)}`;
        }
        document.getElementById("qrCodeImg").src = qrUrl;
    }

    async function loadAddress() {
        const res = await fetch("https://provinces.open-api.vn/api/?depth=3");
        provincesData = await res.json();
        const pSelect = document.getElementById("province");
        provincesData.forEach(p => pSelect.add(new Option(p.name, p.name)));
        $('#province, #district, #ward').select2({ width: '100%' });
    }

    $('#province').on('change', function() {
        const dSelect = document.getElementById("district");
        dSelect.innerHTML = '<option value="">Chọn huyện</option>';
        const p = provincesData.find(x => x.name === this.value);
        if (p) p.districts.forEach(d => dSelect.add(new Option(d.name, d.name)));
        $('#district, #ward').trigger('change.select2');
    });

    $('#district').on('change', function() {
        const wSelect = document.getElementById("ward");
        wSelect.innerHTML = '<option value="">Chọn xã</option>';
        const p = provincesData.find(x => x.name === document.getElementById("province").value);
        const d = p.districts.find(x => x.name === this.value);
        if (d) d.wards.forEach(w => wSelect.add(new Option(w.name, w.name)));
        $('#ward').trigger('change.select2');
    });

    function handleMoneyInput(input, hiddenId, textId) {
        let value = input.value.replace(/\D/g, ""); 
        input.value = value; 
        document.getElementById(hiddenId).value = value;
        calcRemain();
    }
    function formatOnBlur(input) { if (input.value) input.value = Number(input.value.replace(/\D/g, "")).toLocaleString('vi-VN'); }
    function calcRemain() {
        const total = parseFloat(document.getElementById("total").value) || 0;
        const paid = parseFloat(document.getElementById("paid").value) || 0;
        const remain = total - paid;
        document.getElementById("remain_text").innerText = remain.toLocaleString('vi-VN');
        if (document.getElementById("payment").value === "Chuyển khoản") updateQRCode();
    }
    function validatePhone(input) {
        input.value = input.value.replace(/\D/g, '').substring(0, 10);
        if (input.value.length > 0 && input.value[0] !== '0') input.value = '';
    }
    function togglePaymentNote() {
        document.getElementById("transferArea").style.display = (document.getElementById("payment").value === "Chuyển khoản") ? "block" : "none";
        if (document.getElementById("payment").value === "Chuyển khoản") updateQRCode();
    }
    function encodeImageFileAsURL(element) {
        let file = element.files[0];
        if (file) {
            let reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById("imageBase64").value = reader.result;
                document.getElementById("imageName").value = file.name;
                document.getElementById("uploadStatus").innerText = "✔️ Đã nhận ảnh!";
            }
            reader.readAsDataURL(file);
        }
    }
    function handleSubmit() {
        submitted = true;
        document.getElementById("submitBtn").innerText = "Đang gửi...";
        document.getElementById("submitBtn").disabled = true;
        return true;
    }
    function showSuccess() {
        const phone = document.getElementById("phone").value;
        document.getElementById("displayOrderId").innerText = "OD-" + phone.slice(-6);
        document.getElementById("formCard").style.display = "none";
        document.getElementById("successCard").style.display = "block";
        window.scrollTo(0, 0);
    }
    async function downloadQR() {
        const imgUrl = document.getElementById("qrCodeImg").src;
        const response = await fetch(imgUrl);
        const blob = await response.blob();
        const a = document.createElement("a");
        a.href = window.URL.createObjectURL(blob);
        a.download = "QR_SePay.png";
        a.click();
    }
    loadAddress();
</script>
</body>
</html>
